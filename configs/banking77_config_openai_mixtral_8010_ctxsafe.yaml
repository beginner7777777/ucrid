# Banking77 Configuration for UCRID (oos_only + warn-clean, Mixtral-8x7B-v0.1@8010, context-safe)

# Dataset
dataset:
  name: "banking77"
  data_dir: "/mnt/data3/wzc/llm_oos_detection/dataset/banking77_ucrid"
  num_intents: 77
  oos_label: 77
  max_seq_length: 64

# Model
model:
  bert_model: "/mnt/data3/wzc/IntentGPT-llama/models/bert-base-uncased"
  hidden_size: 768
  dropout: 0.1
  num_labels: 78  # 77 intents + 1 OOS

# Training (Stage 1)
training:
  batch_size: 64
  num_epochs: 10
  learning_rate: 2.0e-5
  warmup_ratio: 0.1
  weight_decay: 0.01
  max_grad_norm: 1.0
  fp16: false
  seed: 42
  num_workers: 0

# Loss weights
loss:
  lambda_contrastive: 0.3
  lambda_boundary: 0.1
  temperature: 0.07
  margin: 1.0

# Prototype
prototype:
  update_every_epochs: 1

# Stage 2: Dual-threshold routing
routing:
  alpha: 0.5
  alpha_grid: [0.3, 0.5, 0.7]
  tau_accept: 0.3
  tau_accept_grid: [0.2, 0.3, 0.4]
  tau_reject: 0.8
  tau_reject_grid: [0.7, 0.8, 0.9]
  delta: 1.0
  delta_grid: [1.0]
  temperature: 1.0
  calibrate_temperature: true
  search_max_oos_f1_drop: 0.01
  top_k_candidates: 2

# Stage 3: LLM judge
llm_judge:
  model: "Mixtral-8x7B-v0.1"
  backend: "openai"
  few_shot_k: 1
  oos_examples: 1
  max_tokens: 64
  temperature: 0.0
  disable_thinking: false
  openai_extra_body: {}
  local_batch_size: 8
  shuffle_candidates: true
  random_seed: 42
  accept_policy: "oos_only"

# Inference
inference:
  batch_size: 64

# Evaluation
evaluation:
  metrics: ["accuracy", "f1", "precision", "recall", "oos_f1"]
  save_predictions: true

# Hardware
hardware:
  num_gpus: 8
  gpu_type: "RTX 3090"

# Logging
logging:
  log_dir: "./logs"
  checkpoint_dir: "./checkpoints"

# Experiment
experiment:
  name: "ucrid_banking77"
  version: "v1.0"
  description: "UCRID Banking77 with Mixtral-8x7B-v0.1 context-safe stage3"
