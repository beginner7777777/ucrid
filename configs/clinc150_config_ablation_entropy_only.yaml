# CLINC150 UCRID ablation: entropy-only router (alpha=1.0), no LLM

dataset:
  name: "clinc150"
  data_dir: "/mnt/data3/wzc/llm_oos_detection/dataset/clinc150"
  num_intents: 150
  oos_label: 150
  max_seq_length: 64

model:
  bert_model: "/mnt/data3/wzc/IntentGPT-llama/models/bert-base-uncased"
  hidden_size: 768
  dropout: 0.1
  num_labels: 151

training:
  batch_size: 64
  num_epochs: 10
  learning_rate: 2.0e-5
  warmup_ratio: 0.1
  weight_decay: 0.01
  max_grad_norm: 1.0
  fp16: false
  seed: 42
  num_workers: 0

loss:
  lambda_contrastive: 0.3
  lambda_boundary: 0.1
  temperature: 0.07
  margin: 1.0

prototype:
  update_every_epochs: 1

routing:
  alpha: 1.0
  alpha_grid: [1.0]
  tau_accept: 0.3
  tau_accept_grid: [0.2, 0.3, 0.4]
  tau_reject: 0.8
  tau_reject_grid: [0.7, 0.8, 0.9]
  delta: 1.0
  delta_grid: [1.0]
  temperature: 1.0
  calibrate_temperature: true
  search_max_oos_f1_drop: 0.01
  top_k_candidates: 3

llm_judge:
  model: "Qwen/Qwen3-8B"
  backend: "openai"
  few_shot_k: 3
  oos_examples: 2
  max_tokens: 96
  temperature: 0.0
  disable_thinking: true
  openai_extra_body:
    chat_template_kwargs:
      enable_thinking: false
  local_batch_size: 8
  shuffle_candidates: true
  random_seed: 42
  accept_policy: "oos_only"

inference:
  batch_size: 16

evaluation:
  metrics: ["accuracy", "f1", "precision", "recall", "oos_f1"]
  save_predictions: true
